name: Download RP5 Weather Data

on:
  # Запуск по расписанию (каждый месяц 1-го числа в 3:00 UTC)
  schedule:
    - cron: '0 3 1 * *'
  
  # Ручной запуск через GitHub UI
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install selenium requests webdriver-manager
      
      - name: Setup Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
          install-chromedriver: true
      
      - name: Verify Chrome and ChromeDriver
        run: |
          google-chrome --version
          chromedriver --version
          which chromedriver
      
      - name: Download RP5 data
        run: |
          python rp5-github-action.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/rp5-csv/*.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RP5 weather data" && git push)
