name: Download RP5 Weather Data

on:
  # Запуск по расписанию (каждый месяц 1-го числа в 3:00 UTC)
  schedule:
    - cron: '0 3 1 * *'
  
  # Ручной запуск через GitHub UI
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node dependencies
        run: |
          npm install
      
      - name: Download RP5 data (direct method)
        run: |
          node rp5-github-downloader.js
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/rp5-csv/*.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RP5 weather data" && git push)
