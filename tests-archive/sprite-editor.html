<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sprite Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; height: 100vh; }
#left { width: 420px; flex-shrink: 0; overflow-y: auto; padding: 10px; border-right: 1px solid #444; }
#right { flex: 1; padding: 10px; overflow-y: auto; }
h3 { color: #7af; margin: 8px 0 4px; font-size: 13px; }
.sprite-wrap { position: relative; display: inline-block; background: #000; cursor: crosshair; user-select: none; -webkit-user-select: none; }
.sprite-wrap img { display: block; pointer-events: none; }
.selection { position: absolute; border: 2px solid #f0f; pointer-events: none; background: rgba(255,0,255,0.15); }
.controls { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.controls label { font-size: 12px; }
.controls input[type=number] { width: 60px; background: #333; color: #fff; border: 1px solid #555; padding: 2px 4px; }
#preview-box { background: #000; display: inline-block; padding: 4px; margin: 4px 0; }
#preview-box img { display: block; image-rendering: pixelated; }
#css-out { background: #222; padding: 8px; font-size: 11px; white-space: pre; overflow-x: auto; border: 1px solid #444; margin-top: 8px; }
.icon-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.icon-item { background: #111; padding: 6px; text-align: center; border: 1px solid #333; border-radius: 4px; min-width: 80px; }
.icon-item:hover { border-color: #7af; }
.icon-item .ic-preview { display: flex; justify-content: center; margin-bottom: 4px; }
.icon-item input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 1px 3px; font-size: 10px; margin-top: 2px; border-radius: 2px; }
.icon-item input:focus { border-color: #7af; outline: none; }
.icon-item .ic-coords { display: flex; gap: 2px; margin-top: 3px; }
.icon-item .ic-coords input { width: 36px; text-align: center; }
.icon-item .ic-btns { display: flex; gap: 3px; margin-top: 4px; justify-content: center; }
.icon-item .ic-btns button { padding: 2px 6px; font-size: 10px; }
.icon-item .ic-btns .btn-del { background: #a33; }
button { background: #2a5; color: #fff; border: none; padding: 4px 10px; cursor: pointer; font-size: 12px; border-radius: 3px; }
button:hover { background: #3b6; }
.tab { display: inline-block; padding: 4px 10px; cursor: pointer; background: #333; margin-right: 4px; border-radius: 3px 3px 0 0; font-size: 12px; }
.tab.active { background: #555; }
select { background: #333; color: #fff; border: 1px solid #555; padding: 2px; font-size: 12px; }
</style>
</head>
<body>
<div id="left">
  <h3>Спрайт:</h3>
  <select id="spriteSelect" onchange="loadSprite()">
    <option value="resources/sprites/sprite_w.png">sprite_w (416x204)</option>
    <option value="resources/sprites/sprite-rain-snow.png">sprite-rain-snow (102x135)</option>
    <option value="resources/sprites/sprite_wp_fr_v2.png">sprite_wp_fr_v2 (28x66)</option>
    <option value="resources/sprites/sprite_h.png">sprite_h (345x140)</option>
    <option value="resources/sprites/sprite-tab.png">sprite-tab (25x205)</option>
  </select>
  <div style="margin-top:8px">
    <div class="sprite-wrap" id="spriteWrap">
      <img id="spriteImg" src="resources/sprites/sprite_w.png" onload="onImgLoad()">
      <div class="selection" id="sel"></div>
    </div>
  </div>
  <p style="font-size:11px;color:#888;margin-top:4px">Кликни и тяни для выделения области</p>
</div>
<div id="right">
  <h3>Координаты выделения:</h3>
  <div class="controls">
    <label>X: <input type="number" id="ix" value="0" oninput="updateFromInputs()"></label>
    <label>Y: <input type="number" id="iy" value="0" oninput="updateFromInputs()"></label>
    <label>W: <input type="number" id="iw" value="32" oninput="updateFromInputs()"></label>
    <label>H: <input type="number" id="ih" value="32" oninput="updateFromInputs()"></label>
    <label>Имя: <input type="text" id="iname" value="icon-name" style="width:120px;background:#333;color:#fff;border:1px solid #555;padding:2px 4px"></label>
    <button onclick="addIcon()">+ Добавить</button>
  </div>
  <h3>Превью (2x):</h3>
  <div id="preview-box">
    <div id="preview" style="overflow:hidden;display:inline-block;background:#000"></div>
  </div>
  <h3>Сохранённые иконки:</h3>
  <div class="icon-list" id="iconList"></div>
  <h3>CSS:</h3>
  <button onclick="generateCSS()">Сгенерировать CSS</button>
  <button onclick="clearIcons()" style="background:#a33;margin-left:6px">Очистить</button>
  <button onclick="exportJSON()" style="background:#55a;margin-left:6px">Экспорт JSON</button>
  <div id="css-out"></div>
</div>
<script>
let icons = JSON.parse(localStorage.getItem('spriteIcons') || '[]');
let dragging = false, startX, startY, scale = 1;

function loadSprite() {
  const src = document.getElementById('spriteSelect').value;
  document.getElementById('spriteImg').src = src;
}

function onImgLoad() {
  const img = document.getElementById('spriteImg');
  scale = img.naturalWidth > 300 ? 1 : 2;
  img.style.width = (img.naturalWidth * scale) + 'px';
  updateSel();
  renderIcons();
}

const wrap = document.getElementById('spriteWrap');
const sel  = document.getElementById('sel');

wrap.addEventListener('mousedown', e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  startX = Math.round((e.clientX - r.left + wrap.parentElement.scrollLeft) / scale);
  startY = Math.round((e.clientY - r.top  + wrap.parentElement.scrollTop)  / scale);
  startX = Math.max(0, startX);
  startY = Math.max(0, startY);
  dragging = true;
  document.getElementById('ix').value = startX;
  document.getElementById('iy').value = startY;
  document.getElementById('iw').value = 1;
  document.getElementById('ih').value = 1;
  updateSel();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  const cx = Math.round((e.clientX - r.left + wrap.parentElement.scrollLeft) / scale);
  const cy = Math.round((e.clientY - r.top  + wrap.parentElement.scrollTop)  / scale);
  const x = Math.max(0, Math.min(startX, cx));
  const y = Math.max(0, Math.min(startY, cy));
  const w = Math.abs(cx - startX) || 1;
  const h = Math.abs(cy - startY) || 1;
  document.getElementById('ix').value = x;
  document.getElementById('iy').value = y;
  document.getElementById('iw').value = w;
  document.getElementById('ih').value = h;
  updateSel(); updatePreview();
});

document.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  updatePreview();
});

function updateFromInputs() { updateSel(); updatePreview(); }

function updateSel() {
  const x = +document.getElementById('ix').value;
  const y = +document.getElementById('iy').value;
  const w = +document.getElementById('iw').value;
  const h = +document.getElementById('ih').value;
  sel.style.left   = (x * scale) + 'px';
  sel.style.top    = (y * scale) + 'px';
  sel.style.width  = (w * scale) + 'px';
  sel.style.height = (h * scale) + 'px';
}

function updatePreview() {
  const x = +document.getElementById('ix').value;
  const y = +document.getElementById('iy').value;
  const w = +document.getElementById('iw').value;
  const h = +document.getElementById('ih').value;
  const src = document.getElementById('spriteSelect').value;
  const pv = document.getElementById('preview');
  const pvScale = 2;
  pv.style.width  = (w * pvScale) + 'px';
  pv.style.height = (h * pvScale) + 'px';
  pv.innerHTML = `<img src="${src}" style="margin-left:${-x*pvScale}px;margin-top:${-y*pvScale}px;width:${document.getElementById('spriteImg').naturalWidth * pvScale}px;max-width:none;image-rendering:pixelated">`;
}

function addIcon() {
  const icon = {
    name:   document.getElementById('iname').value,
    sprite: document.getElementById('spriteSelect').value.split('/').pop().replace('.png',''),
    x: +document.getElementById('ix').value,
    y: +document.getElementById('iy').value,
    w: +document.getElementById('iw').value,
    h: +document.getElementById('ih').value
  };
  icons.push(icon);
  save();
  renderIcons();
}

function save() {
  localStorage.setItem('spriteIcons', JSON.stringify(icons));
}

function renderIcons() {
  const list = document.getElementById('iconList');
  list.innerHTML = '';
  icons.forEach((ic, i) => {
    const src = `resources/sprites/${ic.sprite}.png`;
    const s = 1.5;
    const div = document.createElement('div');
    div.className = 'icon-item';
    div.innerHTML = `
      <div class="ic-preview">
        <div id="ic-prev-${i}" style="width:${ic.w*s}px;height:${ic.h*s}px;overflow:hidden;background:#000">
          <img src="${src}" style="margin-left:${-ic.x*s}px;margin-top:${-ic.y*s}px;width:${getOrigW(ic.sprite)*s}px;max-width:none;pointer-events:none">
        </div>
      </div>
      <input type="text"   id="ic-name-${i}" value="${ic.name}" placeholder="имя" oninput="updateIcon(${i})">
      <div class="ic-coords">
        <input type="number" id="ic-x-${i}" value="${ic.x}" title="X" oninput="updateIcon(${i})">
        <input type="number" id="ic-y-${i}" value="${ic.y}" title="Y" oninput="updateIcon(${i})">
        <input type="number" id="ic-w-${i}" value="${ic.w}" title="W" oninput="updateIcon(${i})">
        <input type="number" id="ic-h-${i}" value="${ic.h}" title="H" oninput="updateIcon(${i})">
      </div>
      <div class="ic-btns">
        <button onclick="loadToEditor(${i})" title="Загрузить в редактор">↑</button>
        <button class="btn-del" onclick="removeIcon(${i})">✕</button>
      </div>`;
    list.appendChild(div);
  });
}

function updateIcon(i) {
  const name = document.getElementById(`ic-name-${i}`).value;
  const x = +document.getElementById(`ic-x-${i}`).value;
  const y = +document.getElementById(`ic-y-${i}`).value;
  const w = +document.getElementById(`ic-w-${i}`).value;
  const h = +document.getElementById(`ic-h-${i}`).value;
  icons[i] = { ...icons[i], name, x, y, w, h };
  save();
  // Обновить превью иконки без полного ре-рендера
  const s = 1.5;
  const src = `resources/sprites/${icons[i].sprite}.png`;
  const box = document.getElementById(`ic-prev-${i}`);
  if (box) {
    box.style.width  = (w * s) + 'px';
    box.style.height = (h * s) + 'px';
    box.innerHTML = `<img src="${src}" style="margin-left:${-x*s}px;margin-top:${-y*s}px;width:${getOrigW(icons[i].sprite)*s}px;max-width:none;pointer-events:none">`;
  }
}

function loadToEditor(i) {
  const ic = icons[i];
  // Переключить спрайт если нужно
  const sel = document.getElementById('spriteSelect');
  const optVal = `resources/sprites/${ic.sprite}.png`;
  if (sel.value !== optVal) { sel.value = optVal; loadSprite(); }
  document.getElementById('ix').value = ic.x;
  document.getElementById('iy').value = ic.y;
  document.getElementById('iw').value = ic.w;
  document.getElementById('ih').value = ic.h;
  document.getElementById('iname').value = ic.name;
  updateSel(); updatePreview();
}

function getOrigW(sprite) {
  const map = {'sprite_w':416,'sprite-rain-snow':102,'sprite_wp_fr_v2':28,'sprite_h':345,'sprite-tab':25};
  return map[sprite] || 200;
}

function removeIcon(i) { icons.splice(i,1); save(); renderIcons(); }
function clearIcons()  { if(confirm('Очистить все?')){ icons=[]; save(); renderIcons(); document.getElementById('css-out').textContent=''; } }

function generateCSS() {
  let css = '.weather-icon { display: inline-block; background-repeat: no-repeat; }\n\n';
  icons.forEach(ic => {
    css += `.wi-${ic.name} {\n  background-image: url('resources/sprites/${ic.sprite}.png');\n  background-position: -${ic.x}px -${ic.y}px;\n  width: ${ic.w}px;\n  height: ${ic.h}px;\n}\n\n`;
  });
  document.getElementById('css-out').textContent = css;
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(icons, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sprite-icons.json'; a.click();
}

updatePreview();
renderIcons();
</script>
</body>
</html>
